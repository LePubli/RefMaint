name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trimaint_test
          POSTGRES_USER: trimaint
          POSTGRES_PASSWORD: trimaint_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trimaint"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://trimaint:trimaint_test_password@localhost:5432/trimaint_test
      SECRET_KEY: ci-test-secret-key-for-github-actions-min-32-chars!!
      CORS_ORIGINS: http://localhost
      ENABLE_API_DOCS: "false"
      INITIAL_ADMIN_PASSWORD: CIAdminPass123

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint — check imports and syntax
        run: python -m py_compile app/main.py && python -m py_compile app/core/config.py && python -m py_compile app/core/security.py
        shell: bash

      - name: Run migrations (Alembic)
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t trimaint-backend ./backend

      - name: Build frontend image
        run: docker build -t trimaint-frontend ./frontend

      - name: Verify containers start
        run: |
          docker network create test-net
          docker run -d --name db \
            -e POSTGRES_DB=trimaint -e POSTGRES_USER=trimaint -e POSTGRES_PASSWORD=testpw \
            --network test-net postgres:16-alpine
          sleep 5
          docker run -d --name backend \
            -e DATABASE_URL=postgresql://trimaint:testpw@db:5432/trimaint \
            -e SECRET_KEY=ci-test-secret-key-for-github-actions-min-32-chars!! \
            --network test-net trimaint-backend
          sleep 10
          docker exec backend python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"
          echo "Backend healthcheck OK"
          docker stop backend db
          docker rm backend db
